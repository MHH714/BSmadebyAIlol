<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Brawl Arena</title>
<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#050812;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
#game{
  display:block;
  background:#101522;
}
.ui-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  color:white;
}
.ui-panel{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(1);
  background:rgba(10,12,24,0.96);
  border:4px solid #222a4a;
  border-radius:18px;
  padding:20px 28px;
  box-shadow:0 0 40px rgba(0,0,0,0.7);
  min-width:420px;
  max-width:720px;
  pointer-events:auto;
  transition:transform .25s ease, opacity .25s ease;
}
.ui-panel.hidden{
  opacity:0;
  transform:translate(-50%,-45%) scale(.9);
  pointer-events:none;
}
.ui-title{
  font-size:32px;
  font-weight:900;
  text-align:center;
  margin-bottom:10px;
  text-shadow:0 3px 0 #000;
}
.ui-sub{
  font-size:16px;
  text-align:center;
  margin-bottom:16px;
  color:#c4d0ff;
}
.ui-buttons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.ui-btn{
  background:linear-gradient(#ffdf4a,#ffb02a);
  border:none;
  border-radius:999px;
  padding:10px 22px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  color:#3b2200;
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
  box-shadow:0 4px 0 #c47a00;
  transition:transform .08s ease, box-shadow .08s ease, filter .1s;
}
.ui-btn.mode{
  background:linear-gradient(#4affc9,#00d0a0);
  box-shadow:0 4px 0 #008a6a;
  color:#00251b;
}
.ui-btn.small{
  padding:6px 14px;
  font-size:14px;
}
.ui-btn:hover{
  filter:brightness(1.05);
}
.ui-btn:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 rgba(0,0,0,0.6);
}
.brawler-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:10px;
}
.brawler-card{
  background:#151a33;
  border-radius:14px;
  padding:8px;
  border:3px solid #252c4f;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  gap:4px;
  transition:transform .1s ease, box-shadow .1s ease, border-color .1s;
}
.brawler-card.selected{
  border-color:#ffd54a;
  box-shadow:0 0 12px rgba(255,213,74,0.7);
  transform:translateY(-2px);
}
.brawler-name{
  font-weight:800;
  font-size:15px;
}
.brawler-stats{
  font-size:11px;
  color:#c4d0ff;
}
.brawler-portrait{
  width:100%;
  height:70px;
  border-radius:10px;
  background:#222845;
  position:relative;
  overflow:hidden;
}
.badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  font-size:11px;
  background:#222845;
  color:#c4d0ff;
  margin:2px 2px 0 0;
}
.top-bar{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  pointer-events:none;
}
.top-pill{
  background:rgba(0,0,0,0.55);
  border-radius:999px;
  padding:4px 10px;
  font-size:12px;
  color:#f5f7ff;
  border:2px solid rgba(255,255,255,0.1);
}
.top-pill span{
  font-weight:700;
}
.fade-label{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  font-weight:900;
  color:white;
  text-shadow:0 4px 0 #000;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease, transform .3s ease;
}
.fade-label.show{
  opacity:1;
  transform:translate(-50%,-55%);
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="ui-layer">
  <div id="mainMenu" class="ui-panel">
    <div class="ui-title">Mini Brawl Arena</div>
    <div class="ui-sub">Choose a mode inspired by Brawl Stars. Colorful chaos, all in your browser.</div>
    <div class="ui-buttons">
      <button class="ui-btn mode" data-mode="showdown">Solo Showdown</button>
      <button class="ui-btn mode" data-mode="brawlball">Brawl Ball 3v3</button>
    </div>
  </div>

  <div id="brawlerSelect" class="ui-panel hidden">
    <div class="ui-title">Select Your Brawler</div>
    <div class="ui-sub">Some brawlers can walk on water. Ammo reloads slowly, spend it wisely.</div>
    <div class="brawler-grid" id="brawlerGrid"></div>
    <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
      <div id="brawlerHint" style="font-size:12px;color:#c4d0ff;">Click a brawler to see stats.</div>
      <button id="confirmBrawler" class="ui-btn small">Confirm</button>
    </div>
  </div>

  <div id="resultPanel" class="ui-panel hidden">
    <div id="resultTitle" class="ui-title">Victory!</div>
    <div id="resultSub" class="ui-sub"></div>
    <div class="ui-buttons">
      <button id="playAgain" class="ui-btn">Play Again</button>
      <button id="backMenu" class="ui-btn small">Main Menu</button>
    </div>
  </div>

  <div class="top-bar" id="topBar" style="opacity:0;">
    <div class="top-pill">Mode: <span id="modeLabel">Showdown</span></div>
    <div class="top-pill">Info: <span id="infoLabel">Alive: 10</span></div>
    <div class="top-pill">Score: <span id="scoreLabel">0</span></div>
  </div>

  <div id="centerLabel" class="fade-label"></div>
</div>
<script>
(function(){
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// UI
const mainMenu=document.getElementById('mainMenu');
const brawlerSelectPanel=document.getElementById('brawlerSelect');
const resultPanel=document.getElementById('resultPanel');
const resultTitle=document.getElementById('resultTitle');
const resultSub=document.getElementById('resultSub');
const playAgainBtn=document.getElementById('playAgain');
const backMenuBtn=document.getElementById('backMenu');
const brawlerGrid=document.getElementById('brawlerGrid');
const confirmBrawlerBtn=document.getElementById('confirmBrawler');
const brawlerHint=document.getElementById('brawlerHint');
const topBar=document.getElementById('topBar');
const modeLabelEl=document.getElementById('modeLabel');
const infoLabelEl=document.getElementById('infoLabel');
const scoreLabelEl=document.getElementById('scoreLabel');
const centerLabel=document.getElementById('centerLabel');

let currentMode=null;
let gameState='menu';
let selectedBrawlerIndex=0;
let playerBrawlerTemplate=null;

// Input
const keys={};
let mouseX=0,mouseY=0;
let mouseDownLeft=false;
let mouseDownRight=false;
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=e.clientX-r.left;
  mouseY=e.clientY-r.top;
});
canvas.addEventListener('mousedown',e=>{
  if(e.button===0)mouseDownLeft=true;
  if(e.button===2)mouseDownRight=true;
});
canvas.addEventListener('mouseup',e=>{
  if(e.button===0)mouseDownLeft=false;
  if(e.button===2)mouseDownRight=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// Utils
function randRange(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(randRange(a,b+1));}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function lerp(a,b,t){return a+(b-a)*t;}
function dist(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return Math.hypot(dx,dy);}
function angleTo(ax,ay,bx,by){return Math.atan2(by-ay,bx-ax);}
function chance(p){return Math.random()<p;}

// Camera
const camera={x:0,y:0};

// Brawlers (slower, more HP, slower reload; two can walk on water)
const BRAWLERS=[
  {id:'flare',name:'Flare',color:'#ff6b4a',outline:'#3b1208',maxHp:3600,speed:1.2,damage:360,reload:1.6,range:260,projectileSpeed:6,pattern:'burst',canWaterWalk:false,desc:'Short-range fiery burst. Slow but punchy.'},
  {id:'orbit',name:'Orbit',color:'#4ad1ff',outline:'#08233b',maxHp:4000,speed:1.1,damage:320,reload:1.7,range:320,projectileSpeed:7,pattern:'pierce',canWaterWalk:false,desc:'Long-range piercing orbs. Careful aim needed.'},
  {id:'brute',name:'Brute',color:'#9b5bff',outline:'#1c0a3b',maxHp:5600,speed:0.95,damage:420,reload:1.9,range:220,projectileSpeed:5,pattern:'shotgun',canWaterWalk:false,desc:'Very slow tank with heavy close blast.'},
  {id:'sting',name:'Sting',color:'#ffe14a',outline:'#3b3208',maxHp:3400,speed:1.35,damage:300,reload:1.5,range:280,projectileSpeed:8,pattern:'sniper',canWaterWalk:false,desc:'Fastest of the slow. Precise long shots.'},
  {id:'nova',name:'Nova',color:'#4aff8a',outline:'#083b1a',maxHp:3800,speed:1.15,damage:330,reload:1.6,range:260,projectileSpeed:6.5,pattern:'spread',canWaterWalk:false,desc:'Mid-range spread of star shards.'},
  {id:'quake',name:'Quake',color:'#ff9b4a',outline:'#3b1f08',maxHp:4800,speed:1.0,damage:380,reload:1.8,range:230,projectileSpeed:5.5,pattern:'arc',canWaterWalk:false,desc:'Arcing ground shockwaves. Area control.'},
  {id:'tide',name:'Tide',color:'#4affff',outline:'#083b3b',maxHp:3600,speed:1.2,damage:310,reload:1.6,range:270,projectileSpeed:6.5,pattern:'pierce',canWaterWalk:true,desc:'Water runner. Can walk on water tiles.'},
  {id:'reef',name:'Reef',color:'#3bd1b8',outline:'#06352b',maxHp:4200,speed:1.05,damage:340,reload:1.7,range:250,projectileSpeed:6,pattern:'burst',canWaterWalk:true,desc:'Bulky swimmer. Can walk on water tiles.'},
  {id:'ember',name:'Ember',color:'#ff8b4a',outline:'#3b1608',maxHp:3500,speed:1.25,damage:320,reload:1.6,range:250,projectileSpeed:6.5,pattern:'spread',canWaterWalk:false,desc:'Short-range flame shards, slow reload.'},
  {id:'volt',name:'Volt',color:'#ffe94a',outline:'#3b3608',maxHp:3300,speed:1.3,damage:300,reload:1.5,range:290,projectileSpeed:7.5,pattern:'sniper',canWaterWalk:false,desc:'Zapping shots, but very slow reload.'}
];

let brawlerCards=[];
function buildBrawlerGrid(){
  brawlerGrid.innerHTML='';
  brawlerCards=[];
  BRAWLERS.forEach((b,i)=>{
    const card=document.createElement('div');
    card.className='brawler-card';
    if(i===selectedBrawlerIndex)card.classList.add('selected');
    const name=document.createElement('div');
    name.className='brawler-name';
    name.textContent=b.name;
    const portrait=document.createElement('div');
    portrait.className='brawler-portrait';
    const stats=document.createElement('div');
    stats.className='brawler-stats';
    stats.innerHTML=
      'HP: '+b.maxHp+
      '<br>Speed: '+b.speed.toFixed(2)+
      '<br>Damage: '+b.damage+
      '<br>Reload: '+b.reload.toFixed(2)+'s'+
      (b.canWaterWalk?'<br><b>Water Walker</b>':'');
    const tags=document.createElement('div');
    const badge=document.createElement('span');
    badge.className='badge';
    badge.textContent=b.desc;
    tags.appendChild(badge);
    card.appendChild(name);
    card.appendChild(portrait);
    card.appendChild(stats);
    card.appendChild(tags);
    card.addEventListener('click',()=>{
      selectedBrawlerIndex=i;
      brawlerCards.forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      brawlerHint.textContent=b.name+': '+b.desc;
    });
    brawlerGrid.appendChild(card);
    brawlerCards.push(card);
  });
}
buildBrawlerGrid();

// UI helpers
function showPanel(panel){
  [mainMenu,brawlerSelectPanel,resultPanel].forEach(p=>{
    if(p===panel)p.classList.remove('hidden');
    else p.classList.add('hidden');
  });
}
function setTopBarVisible(v){topBar.style.opacity=v?1:0;}
function showCenterLabel(text,color='#ffffff'){
  centerLabel.textContent=text;
  centerLabel.style.color=color;
  centerLabel.classList.add('show');
  setTimeout(()=>centerLabel.classList.remove('show'),900);
}

// Mode buttons
mainMenu.querySelectorAll('.ui-btn.mode').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentMode=btn.dataset.mode;
    modeLabelEl.textContent=currentMode==='showdown'?'Solo Showdown':'Brawl Ball';
    gameState='select';
    showPanel(brawlerSelectPanel);
  });
});
confirmBrawlerBtn.addEventListener('click',()=>{
  playerBrawlerTemplate=BRAWLERS[selectedBrawlerIndex];
  startGame();
});
playAgainBtn.addEventListener('click',()=>{
  gameState='select';
  showPanel(brawlerSelectPanel);
});
backMenuBtn.addEventListener('click',()=>{
  gameState='menu';
  showPanel(mainMenu);
  setTopBarVisible(false);
});

// Entities
let entities=[];
let projectiles=[];
let powerBoxes=[];
let powerCubes=[];
let particles=[];
let damageTexts=[];
let gas=null;
let ball=null;
let goals=[];
let teams=[];
let player=null;
let aliveCount=0;
let score=0;
let showdownTimer=0;
let world={width:2600,height:2600};
let matchOver=false;
let spawnPoints=[{x:0,y:0},{x:0,y:0}];
let bushes=[];
let walls=[];
let waterTiles=[];

class Entity{
  constructor(x,y,t,isPlayer=false,team=0){
    this.x=x;this.y=y;
    this.vx=0;this.vy=0;
    this.radius=22;
    this.template=t;
    this.color=t.color;
    this.outline=t.outline;
    this.maxHp=t.maxHp;
    this.hp=this.maxHp;
    this.speed=t.speed;
    this.damage=t.damage;
    this.reloadTime=t.reload;
    this.range=t.range;
    this.projectileSpeed=t.projectileSpeed;
    this.pattern=t.pattern;
    this.canWaterWalk=t.canWaterWalk;
    this.isPlayer=isPlayer;
    this.team=team;
    this.dead=false;
    this.power=0;
    this.aiState={target:null,mode:'wander',cooldown:0,ballChaseCooldown:0};
    this.hasBall=false;
    this.name=t.name;
    this.shootCooldown=0;
    this.ammoMax=3;
    this.ammo=this.ammoMax;
    this.ammoReloadTimer=this.reloadTime*1.2;
    this.inBush=false;
    this.invincibleTimer=0;
    this.respawnTimer=0;
  }
}

class Projectile{
  constructor(x,y,dx,dy,speed,damage,owner,life=1.2){
    this.x=x;this.y=y;
    const len=Math.hypot(dx,dy)||1;
    this.vx=dx/len*speed;
    this.vy=dy/len*speed;
    this.damage=damage;
    this.owner=owner;
    this.life=life;
    this.radius=6;
    this.color=owner.color;
  }
}
class PowerBox{constructor(x,y){this.x=x;this.y=y;this.hp=900;this.radius=20;}}
class PowerCube{
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=randRange(-0.5,0.5);
    this.vy=randRange(-0.5,0.5);
    this.radius=10;
    this.life=999;
  }
}
class Particle{
  constructor(x,y,color,size,life){
    this.x=x;this.y=y;
    this.vx=randRange(-1.5,1.5);
    this.vy=randRange(-1.5,1.5);
    this.color=color;
    this.size=size;
    this.life=life;
    this.maxLife=life;
  }
}
class DamageText{
  constructor(x,y,text,color){
    this.x=x;this.y=y;
    this.text=text;
    this.color=color;
    this.life=0.8;
  }
}
class Gas{
  constructor(cx,cy,radius){
    this.cx=cx;this.cy=cy;
    this.radius=radius;
    this.targetRadius=radius*0.25;
    this.shrinkDuration=160;
    this.time=0;
    this.damagePerSecond=90;
  }
  update(dt){
    this.time+=dt;
    const t=clamp(this.time/this.shrinkDuration,0,1);
    this.radius=lerp(this.radius,this.targetRadius,t);
  }
}
class Ball{
  constructor(x,y){this.x=x;this.y=y;this.vx=0;this.vy=0;this.radius=14;this.owner=null;}
}
class Goal{
  constructor(x,y,w,h,team){this.x=x;this.y=y;this.width=w;this.height=h;this.team=team;}
}

// Collisions
function rectCircleCollide(rect,cx,cy,r){
  const closestX=clamp(cx,rect.x,rect.x+rect.width);
  const closestY=clamp(cy,rect.y,rect.y+rect.height);
  const dx=cx-closestX,dy=cy-closestY;
  return dx*dx+dy*dy<r*r;
}
function circleCircleCollide(ax,ay,ar,bx,by,br){
  const dx=ax-bx,dy=ay-by;
  return dx*dx+dy*dy<(ar+br)*(ar+br);
}

// Map generation
function generateShowdownMap(){
  world.width=2000;world.height=1400;
  walls=[];bushes=[];powerBoxes=[];powerCubes=[];waterTiles=[];
  const margin=80;
  for(let x=margin;x<world.width-margin;x+=80){
    walls.push({x,y:margin,width:60,height:60});
    walls.push({x,y:world.height-margin-60,width:60,height:60});
  }
  for(let y=margin;y<world.height-margin;y+=80){
    walls.push({x:margin,y,width:60,height:60});
    walls.push({x:world.width-margin-60,y,width:60,height:60});
  }
  const cx=world.width/2,cy=world.height/2;
  walls.push({x:cx-80,y:cy-40,width:160,height:80});
  walls.push({x:cx-80,y:cy-200,width:160,height:60});
  walls.push({x:cx-80,y:cy+140,width:160,height:60});
  walls.push({x:cx-360,y:cy-40,width:80,height:80});
  walls.push({x:cx+280,y:cy-40,width:80,height:80});
  function addBushRect(x,y,w,h){bushes.push({x,y,width:w,height:h});}
  addBushRect(cx-260,cy-260,140,80);
  addBushRect(cx+120,cy-260,140,80);
  addBushRect(cx-260,cy+180,140,80);
  addBushRect(cx+120,cy+180,140,80);
  addBushRect(cx-520,cy-40,120,120);
  addBushRect(cx+400,cy-40,120,120);
  addBushRect(cx-120,cy-420,260,80);
  addBushRect(cx-120,cy+340,260,80);
  const boxSpots=[
    {x:cx,y:cy-120},{x:cx,y:cy+120},
    {x:cx-260,y:cy-40},{x:cx+260,y:cy-40},
    {x:cx-420,y:cy-260},{x:cx+420,y:cy-260},
    {x:cx-420,y:cy+260},{x:cx+420,y:cy+260}
  ];
  boxSpots.forEach(p=>powerBoxes.push(new PowerBox(p.x,p.y)));
  const waterW=260,waterH=180;
  waterTiles.push({x:cx-waterW/2,y:cy-waterH/2,width:waterW,height:waterH});
  gas=null;
}

function generateBrawlBallMap(){
  world.width=1800;world.height=1100;
  walls=[];bushes=[];powerBoxes=[];powerCubes=[];waterTiles=[];
  const cx=world.width/2,cy=world.height/2;
  const margin=80;
  for(let x=margin;x<world.width-margin;x+=80){
    walls.push({x,y:margin,width:60,height:60});
    walls.push({x,y:world.height-margin-60,width:60,height:60});
  }
  for(let y=margin;y<world.height-margin;y+=80){
    walls.push({x:margin,y,width:60,height:60});
    walls.push({x:world.width-margin-60,y,width:60,height:60});
  }
  walls.push({x:cx-60,y:cy-220,width:120,height:80});
  walls.push({x:cx-60,y:cy+140,width:120,height:80});
  walls.push({x:cx-420,y:cy-40,width:80,height:120});
  walls.push({x:cx+340,y:cy-40,width:80,height:120});
  bushes.push({x:cx-260,y:cy-260,width:160,height:80});
  bushes.push({x:cx+100,y:cy-260,width:160,height:80});
  bushes.push({x:cx-260,y:cy+180,width:160,height:80});
  bushes.push({x:cx+100,y:cy+180,width:160,height:80});
  const waterW=260,waterH=200;
  waterTiles.push({x:cx-waterW/2,y:cy-waterH/2,width:waterW,height:waterH});
  gas=null;
  goals=[];
  const gw=140,gh=260;
  goals.push(new Goal(40,world.height/2-gh/2,gw,gh,0));
  goals.push(new Goal(world.width-40-gw,world.height/2-gh/2,gw,gh,1));
  ball=new Ball(world.width/2,world.height/2);
}

// Spawn helpers: edges only, avoid walls/water
function collidesWithObstacles(x,y,r,canWater){
  for(const w of walls)if(rectCircleCollide(w,x,y,r))return true;
  for(const wt of waterTiles){
    if(rectCircleCollide(wt,x,y,r) && !canWater)return true;
  }
  return false;
}
function randomEdgeSpawn(canWater){
  let x,y;
  const r=26;
  for(let tries=0;tries<200;tries++){
    const side=randInt(0,3);
    if(side===0){x=randRange(r,world.width-r);y=r+10;}
    else if(side===1){x=randRange(r,world.width-r);y=world.height-r-10;}
    else if(side===2){x=r+10;y=randRange(r,world.height-r);}
    else{x=world.width-r-10;y=randRange(r,world.height-r);}
    if(!collidesWithObstacles(x,y,r,canWater))return {x,y};
  }
  return {x:world.width/2,y:world.height/2};
}

// Start game
function startGame(){
  entities=[];projectiles=[];powerBoxes=[];powerCubes=[];particles=[];damageTexts=[];
  teams=[{score:0},{score:0}];
  score=0;matchOver=false;showdownTimer=0;gas=null;
  if(currentMode==='showdown'){
    generateShowdownMap();
    const pSpawn=randomEdgeSpawn(playerBrawlerTemplate.canWaterWalk);
    player=new Entity(pSpawn.x,pSpawn.y,playerBrawlerTemplate,true,0);
    entities.push(player);
    for(let i=0;i<9;i++){
      const t=BRAWLERS[randInt(0,BRAWLERS.length-1)];
      const s=randomEdgeSpawn(t.canWaterWalk);
      const e=new Entity(s.x,s.y,t,false,i+1);
      entities.push(e);
    }
    aliveCount=entities.length;
  }else{
    generateBrawlBallMap();
    const playerTeam=0,enemyTeam=1;
    const leftEdge=120,rightEdge=world.width-120;
    spawnPoints[0]={x:leftEdge,y:world.height/2};
    spawnPoints[1]={x:rightEdge,y:world.height/2};
    function safeNearEdge(edgeX,team,tmpl){
      for(let tries=0;tries<200;tries++){
        const x=edgeX+randRange(-40,40);
        const y=world.height*0.3+Math.random()*world.height*0.4;
        if(!collidesWithObstacles(x,y,26,tmpl.canWaterWalk))return {x,y};
      }
      return {x:edgeX,y:world.height/2};
    }
    const pPos=safeNearEdge(leftEdge,playerTeam,playerBrawlerTemplate);
    player=new Entity(pPos.x,pPos.y,playerBrawlerTemplate,true,playerTeam);
    entities.push(player);
    for(let i=0;i<2;i++){
      const t=BRAWLERS[randInt(0,BRAWLERS.length-1)];
      const pos=safeNearEdge(leftEdge,playerTeam,t);
      const e=new Entity(pos.x,pos.y,t,false,playerTeam);
      entities.push(e);
    }
    for(let i=0;i<3;i++){
      const t=BRAWLERS[randInt(0,BRAWLERS.length-1)];
      const pos=safeNearEdge(rightEdge,enemyTeam,t);
      const e=new Entity(pos.x,pos.y,t,false,enemyTeam);
      entities.push(e);
    }
    aliveCount=entities.length;
  }
  gameState='playing';
  showPanel(null);
  setTopBarVisible(true);
  scoreLabelEl.textContent='0';
  infoLabelEl.textContent=currentMode==='showdown'?'Alive: '+aliveCount:'0 - 0';
  showCenterLabel(currentMode==='showdown'?'Solo Showdown':'Brawl Ball','#ffd54a');
}

// Shooting
function firePattern(e,ang){
  const baseDamage=e.damage*(1+e.power*0.12);
  const speed=e.projectileSpeed;
  const range=e.range*(1+e.power*0.08);
  const cos=Math.cos(ang),sin=Math.sin(ang);
  const px=e.x+cos*(e.radius+4);
  const py=e.y+sin*(e.radius+4);
  const shots=[];
  switch(e.pattern){
    case 'burst':
      for(let i=-1;i<=1;i++){
        const a=ang+i*0.12;
        shots.push(new Projectile(px,py,Math.cos(a),Math.sin(a),speed,baseDamage, e,range/speed));
      }break;
    case 'pierce':
      shots.push(new Projectile(px,py,cos,sin,speed,baseDamage*1.05,e,range/speed));break;
    case 'shotgun':
      for(let i=-2;i<=2;i++){
        const a=ang+i*0.18;
        shots.push(new Projectile(px,py,Math.cos(a),Math.sin(a),speed*0.9,baseDamage*0.55,e,range/speed*0.8));
      }break;
    case 'sniper':
      shots.push(new Projectile(px,py,cos,sin,speed*1.2,baseDamage*1.15,e,range/speed*1.1));break;
    case 'spread':
      for(let i=-1;i<=1;i++){
        const a=ang+i*0.22;
        shots.push(new Projectile(px,py,Math.cos(a),Math.sin(a),speed,baseDamage*0.8,e,range/speed));
      }break;
    case 'arc':
      for(let i=-1;i<=1;i++){
        const a=ang+i*0.16;
        shots.push(new Projectile(px,py,Math.cos(a),Math.sin(a),speed*0.8,baseDamage*0.9,e,range/speed));
      }break;
  }
  shots.forEach(s=>projectiles.push(s));
  for(let i=0;i<4;i++)particles.push(new Particle(px,py,e.color,4,0.3));
}

// Bush visibility
function isInBush(e){
  for(const b of bushes){
    if(e.x>b.x && e.x<b.x+b.width && e.y>b.y && e.y<b.y+b.height)return true;
  }
  return false;
}
function canSee(a,b){
  if(!b.inBush)return true;
  if(a.inBush)return true;
  if(dist(a.x,a.y,b.x,b.y)<60)return true;
  return false;
}

// Wall & water avoidance steering
function steerAroundObstacles(e,dx,dy){
  let best={x:dx,y:dy};
  const speed=e.speed*1.2;
  function collides(nx,ny){
    const tx=e.x+nx*speed,ty=e.y+ny*speed,r=e.radius+4;
    for(const w of walls)if(rectCircleCollide(w,tx,ty,r))return true;
    for(const wt of waterTiles){
      if(rectCircleCollide(wt,tx,ty,r) && !e.canWaterWalk)return true;
    }
    return false;
  }
  if(!collides(dx,dy))return best;
  let ang=Math.atan2(dy,dx);
  for(let i=1;i<=10;i++){
    const a1=ang+i*0.25;
    const a2=ang-i*0.25;
    const c1={x:Math.cos(a1),y:Math.sin(a1)};
    const c2={x:Math.cos(a2),y:Math.sin(a2)};
    if(!collides(c1.x,c1.y))return c1;
    if(!collides(c2.x,c2.y))return c2;
  }
  return best;
}

// AI
function aiShowdown(e,dt){
  const state=e.aiState;
  state.cooldown-=dt;
  const centerX=world.width/2,centerY=world.height/2;
  if(gas){
    const d=dist(e.x,e.y,gas.cx,gas.cy);
    if(d>gas.radius-140){
      const ang=angleTo(e.x,e.y,gas.cx,gas.cy);
      const steer=steerAroundObstacles(e,Math.cos(ang),Math.sin(ang));
      e.vx+=steer.x*e.speed*1.2;
      e.vy+=steer.y*e.speed*1.2;
    }
    if(d>gas.radius){
      const ang=angleTo(e.x,e.y,gas.cx,gas.cy);
      const steer=steerAroundObstacles(e,Math.cos(ang),Math.sin(ang));
      e.vx+=steer.x*e.speed*1.6;
      e.vy+=steer.y*e.speed*1.6;
    }
  }
  let nearestEnemy=null,nd=99999;
  entities.forEach(o=>{
    if(o===e||o.dead)return;
    if(!canSee(e,o))return;
    const d=dist(e.x,e.y,o.x,o.y);
    if(d<nd){nd=d;nearestEnemy=o;}
  });
  let nearestBox=null,bd=420;
  powerBoxes.forEach(b=>{
    const d=dist(e.x,e.y,b.x,b.y);
    if(d<bd){bd=d;nearestBox=b;}
  });
  const playerVisible=player && !player.dead && canSee(e,player) && dist(e.x,e.y,player.x,player.y)<420;
  if(playerVisible && chance(0.6)){
    const d=dist(e.x,e.y,player.x,player.y);
    const ang=angleTo(e.x,e.y,player.x,player.y);
    if(d>e.range*0.7){
      const steer=steerAroundObstacles(e,Math.cos(ang),Math.sin(ang));
      e.vx+=steer.x*e.speed;
      e.vy+=steer.y*e.speed;
    }else if(d<e.range*0.4){
      const steer=steerAroundObstacles(e,-Math.cos(ang),-Math.sin(ang));
      e.vx+=steer.x*e.speed*0.7;
      e.vy+=steer.y*e.speed*0.7;
    }
    if(state.cooldown<=0 && d<e.range*1.1 && e.ammo>0){
      firePattern(e,ang);
      e.ammo--;
      state.cooldown=e.reloadTime+randRange(-0.1,0.1);
    }
  }else if(nearestEnemy && nd<360){
    const ang=angleTo(e.x,e.y,nearestEnemy.x,nearestEnemy.y);
    if(nd>e.range*0.7){
      const steer=steerAroundObstacles(e,Math.cos(ang),Math.sin(ang));
      e.vx+=steer.x*e.speed;
      e.vy+=steer.y*e.speed;
    }else if(nd<e.range*0.4){
      const steer=steerAroundObstacles(e,-Math.cos(ang),-Math.sin(ang));
      e.vx+=steer.x*e.speed*0.7;
      e.vy+=steer.y*e.speed*0.7;
    }
    if(state.cooldown<=0 && nd<e.range*1.1 && e.ammo>0){
      firePattern(e,ang);
      e.ammo--;
      state.cooldown=e.reloadTime+randRange(-0.1,0.1);
    }
  }else if(nearestBox && bd<260){
    const ang=angleTo(e.x,e.y,nearestBox.x,nearestBox.y);
    const steer=steerAroundObstacles(e,Math.cos(ang),Math.sin(ang));
    e.vx+=steer.x*e.speed;
    e.vy+=steer.y*e.speed;
    if(state.cooldown<=0 && e.ammo>0){
      firePattern(e,ang);
      e.ammo--;
      state.cooldown=e.reloadTime+randRange(-0.1,0.1);
    }
  }else{
    if(!state.wanderDir||chance(0.01)){
      const ang=angleTo(e.x,e.y,centerX,centerY)+randRange(-1,1);
      state.wanderDir={x:Math.cos(ang),y:Math.sin(ang)};
    }
    const steer=steerAroundObstacles(e,state.wanderDir.x,state.wanderDir.y);
    e.vx+=steer.x*e.speed*0.5;
    e.vy+=steer.y*e.speed*0.5;
  }
}

function aiBrawlBall(e,dt){
  const state=e.aiState;
  state.cooldown-=dt;
  state.ballChaseCooldown-=dt;
  const myTeam=e.team;
  const enemyGoal=goals.find(g=>g.team!==myTeam);
  const myGoal=goals.find(g=>g.team===myTeam);
  if(ball.owner===e){
    const angToGoal=angleTo(e.x,e.y,enemyGoal.x+enemyGoal.width/2,enemyGoal.y+enemyGoal.height/2);
    const dGoal=dist(e.x,e.y,enemyGoal.x+enemyGoal.width/2,enemyGoal.y+enemyGoal.height/2);
    const steer=steerAroundObstacles(e,Math.cos(angToGoal),Math.sin(angToGoal));
    e.vx+=steer.x*e.speed;
    e.vy+=steer.y*e.speed;
    if(state.cooldown<=0 && dGoal<420){
      ball.owner=null;
      ball.vx=Math.cos(angToGoal)*10;
      ball.vy=Math.sin(angToGoal)*10;
      state.cooldown=0.6;
      showCenterLabel('SHOT!','#4affc9');
    }
  }else{
    const dBall=dist(e.x,e.y,ball.x,ball.y);
    const angBall=angleTo(e.x,e.y,ball.x,ball.y);
    if(dBall<420 || state.ballChaseCooldown<=0){
      const steer=steerAroundObstacles(e,Math.cos(angBall),Math.sin(angBall));
      e.vx+=steer.x*e.speed;
      e.vy+=steer.y*e.speed;
    }
  }
  let nearestEnemy=null,nd=260;
  entities.forEach(o=>{
    if(o===e||o.dead||o.team===e.team)return;
    if(!canSee(e,o))return;
    const d=dist(e.x,e.y,o.x,o.y);
    if(d<nd){nd=d;nearestEnemy=o;}
  });
  if(nearestEnemy){
    const ang=angleTo(e.x,e.y,nearestEnemy.x,nearestEnemy.y);
    if(state.cooldown<=0 && e.ammo>0){
      firePattern(e,ang);
      e.ammo--;
      state.cooldown=e.reloadTime+randRange(-0.1,0.1);
    }
  }
  const dMyGoal=dist(e.x,e.y,myGoal.x+myGoal.width/2,myGoal.y+myGoal.height/2);
  if(dMyGoal<200){
    const ang=angleTo(e.x,e.y,myGoal.x+myGoal.width/2,myGoal.y+myGoal.height/2);
    const steer=steerAroundObstacles(e,-Math.cos(ang),-Math.sin(ang));
    e.vx+=steer.x*e.speed*0.8;
    e.vy+=steer.y*e.speed*0.8;
  }
}

// Movement
function updateBushStatus(){
  entities.forEach(e=>{
    if(e.dead){e.inBush=false;return;}
    e.inBush=isInBush(e);
  });
}
function updateMovement(dt){
  entities.forEach(e=>{
    if(e.dead)return;
    if(e.isPlayer){
      let mx=0,my=0;
      if(keys['w']||keys['arrowup'])my-=1;
      if(keys['s']||keys['arrowdown'])my+=1;
      if(keys['a']||keys['arrowleft'])mx-=1;
      if(keys['d']||keys['arrowright'])mx+=1;
      const len=Math.hypot(mx,my)||1;
      mx/=len;my/=len;
      e.vx+=mx*e.speed*1.3;
      e.vy+=my*e.speed*1.3;
      const wx=mouseX+camera.x,wy=mouseY+camera.y;
      const ang=angleTo(e.x,e.y,wx,wy);
      e.shootCooldown-=dt;
      if(mouseDownLeft && e.shootCooldown<=0 && e.ammo>0){
        firePattern(e,ang);
        e.ammo--;
        e.shootCooldown=0.22;
      }
    }
    e.vx*=0.86;e.vy*=0.86;
    let nx=e.x+e.vx,ny=e.y+e.vy;
    walls.forEach(w=>{
      if(rectCircleCollide(w,nx,ny,e.radius)){
        if(rectCircleCollide(w,e.x+e.vx,ny,e.radius)){e.vx=0;nx=e.x;}
        if(rectCircleCollide(w,nx,e.y+e.vy,e.radius)){e.vy=0;ny=e.y;}
      }
    });
    waterTiles.forEach(wt=>{
      if(!e.canWaterWalk && rectCircleCollide(wt,nx,ny,e.radius)){
        if(rectCircleCollide(wt,e.x+e.vx,ny,e.radius)){e.vx=0;nx=e.x;}
        if(rectCircleCollide(wt,nx,e.y+e.vy,e.radius)){e.vy=0;ny=e.y;}
      }
    });
    e.x=clamp(nx,e.radius,world.width-e.radius);
    e.y=clamp(ny,e.radius,world.height-e.radius);
  });
}

// Ammo reload (slower)
function updateAmmo(dt){
  entities.forEach(e=>{
    if(e.dead)return;
    if(e.ammo<e.ammoMax){
      e.ammoReloadTimer-=dt;
      if(e.ammoReloadTimer<=0){
        e.ammo++;
        if(e.ammo<e.ammoMax)e.ammoReloadTimer=e.reloadTime*1.2;
      }
    }else{
      e.ammoReloadTimer=e.reloadTime*1.2;
    }
  });
}

// Projectiles
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.life-=dt;
    if(p.life<=0){projectiles.splice(i,1);continue;}
    p.x+=p.vx;p.y+=p.vy;
    for(const w of walls){
      if(rectCircleCollide(w,p.x,p.y,p.radius)){
        for(let k=0;k<4;k++)particles.push(new Particle(p.x,p.y,p.color,3,0.25));
        projectiles.splice(i,1);
        break;
      }
    }
    if(i>=projectiles.length)continue;
    for(const e of entities){
      if(e.dead||e===p.owner)continue;
      if(e.invincibleTimer>0)continue;
      if(currentMode==='brawlball' && e.team===p.owner.team)continue;
      if(circleCircleCollide(p.x,p.y,p.radius,e.x,e.y,e.radius)){
        e.hp-=p.damage;
        damageTexts.push(new DamageText(e.x,e.y-30,Math.round(p.damage),'#ffef7a'));
        for(let k=0;k<6;k++)particles.push(new Particle(e.x,e.y,p.color,3,0.35));
        projectiles.splice(i,1);
        break;
      }
    }
  }
}

// Boxes & cubes
function updateBoxes(dt){
  for(let i=powerBoxes.length-1;i>=0;i--){
    const b=powerBoxes[i];
    for(let j=projectiles.length-1;j>=0;j--){
      const p=projectiles[j];
      if(circleCircleCollide(b.x,b.y,b.radius,p.x,p.y,p.radius)){
        b.hp-=p.damage;
        projectiles.splice(j,1);
        damageTexts.push(new DamageText(b.x,b.y-20,Math.round(p.damage),'#a0ff7a'));
        for(let k=0;k<4;k++)particles.push(new Particle(b.x,b.y,'#ffdf4a',3,0.3));
        break;
      }
    }
    if(b.hp<=0){
      const count=randInt(1,3);
      for(let c=0;c<count;c++)powerCubes.push(new PowerCube(b.x+randRange(-8,8),b.y+randRange(-8,8)));
      for(let k=0;k<12;k++)particles.push(new Particle(b.x,b.y,'#ffdf4a',4,0.5));
      powerBoxes.splice(i,1);
    }
  }
  for(let i=powerCubes.length-1;i>=0;i--){
    const c=powerCubes[i];
    c.life-=dt;
    c.x+=c.vx;c.y+=c.vy;
    c.vx*=0.9;c.vy*=0.9;
    for(const e of entities){
      if(e.dead)continue;
      if(circleCircleCollide(c.x,c.y,c.radius,e.x,e.y,e.radius)){
        e.power++;e.maxHp+=260;e.hp+=260;e.radius+=1.5;e.damage+=30;
        powerCubes.splice(i,1);
        for(let k=0;k<10;k++)particles.push(new Particle(e.x,e.y,'#ffdf4a',4,0.4));
        break;
      }
    }
  }
}

// Gas
function updateGas(dt){
  if(currentMode!=='showdown')return;
  showdownTimer+=dt;
  if(!gas && showdownTimer>8){
    const r=Math.max(world.width,world.height)*1.2;
    gas=new Gas(world.width/2,world.height/2,r);
  }
  if(!gas)return;
  gas.update(dt);
  entities.forEach(e=>{
    if(e.dead)return;
    if(e.invincibleTimer>0)return;
    const d=dist(e.x,e.y,gas.cx,gas.cy);
    if(d>gas.radius){
      const dmg=gas.damagePerSecond*dt;
      e.hp-=dmg;
      if(chance(0.2))particles.push(new Particle(e.x,e.y,'#7affff',3,0.4));
    }
  });
}

// Ball & goals
function updateBall(dt){
  if(!ball)return;
  if(ball.owner){
    const ang=Math.atan2(ball.owner.vy,ball.owner.vx)||0;
    ball.x=ball.owner.x+Math.cos(ang)*20;
    ball.y=ball.owner.y+Math.sin(ang)*20;
  }else{
    ball.x+=ball.vx;ball.y+=ball.vy;
    ball.vx*=0.96;ball.vy*=0.96;
    for(const w of walls){
      if(rectCircleCollide(w,ball.x,ball.y,ball.radius)){
        if(rectCircleCollide(w,ball.x-ball.vx,ball.y,ball.radius))ball.vx*=-0.7;
        if(rectCircleCollide(w,ball.x,ball.y-ball.vy,ball.radius))ball.vy*=-0.7;
      }
    }
    ball.x=clamp(ball.x,ball.radius,world.width-ball.radius);
    ball.y=clamp(ball.y,ball.radius,world.height-ball.radius);
    let best=null,bd=26;
    entities.forEach(e=>{
      if(e.dead)return;
      const d=dist(e.x,e.y,ball.x,ball.y);
      if(d<bd){bd=d;best=e;}
    });
    if(best){
      ball.owner=best;
      best.hasBall=true;
      best.aiState.ballChaseCooldown=1.2;
      showCenterLabel(best.isPlayer?'BALL!':'Ball taken',best.team===0?'#4affc9':'#ff6b4a');
    }
  }
  if(!ball.owner){
    entities.forEach(e=>{
      if(e.dead)return;
      if(circleCircleCollide(ball.x,ball.y,ball.radius,e.x,e.y,e.radius)){
        const ang=angleTo(ball.x,ball.y,e.x,e.y);
        ball.vx+=Math.cos(ang)*0.8;
        ball.vy+=Math.sin(ang)*0.8;
      }
    });
  }
  for(const g of goals){
    if(ball.x>g.x && ball.x<g.x+g.width && ball.y>g.y && ball.y<g.y+g.height){
      const scoringTeam=g.team===0?1:0;
      teams[scoringTeam].score++;
      infoLabelEl.textContent=teams[0].score+' - '+teams[1].score;
      for(let i=0;i<40;i++)particles.push(new Particle(ball.x,ball.y,scoringTeam===0?'#4affc9':'#ff6b4a',5,0.8));
      showCenterLabel('GOAL!','#ffdf4a');
      resetBrawlBallPositions();
      break;
    }
  }
  if(teams[0].score>=2 || teams[1].score>=2){
    endMatchBrawlBall(teams[0].score>teams[1].score);
  }
}
function resetBrawlBallPositions(){
  ball.owner=null;
  ball.x=world.width/2;ball.y=world.height/2;
  ball.vx=ball.vy=0;
  entities.forEach(e=>{
    e.hasBall=false;
    const sp=spawnPoints[e.team];
    let pos;
    for(let tries=0;tries<200;tries++){
      const x=sp.x+randRange(-40,40);
      const y=world.height*0.3+Math.random()*world.height*0.4;
      if(!collidesWithObstacles(x,y,e.radius,e.canWaterWalk)){pos={x,y};break;}
    }
    if(!pos)pos={x:sp.x,y:sp.y};
    e.x=pos.x;e.y=pos.y;
    e.vx=e.vy=0;
    e.invincibleTimer=2.5;
  });
}

// Particles & damage text
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.02;
  }
  for(let i=damageTexts.length-1;i>=0;i--){
    const d=damageTexts[i];
    d.life-=dt;
    d.y-=20*dt;
    if(d.life<=0)damageTexts.splice(i,1);
  }
}

// HP, deaths, respawns
function updateHP(dt){
  aliveCount=0;
  entities.forEach(e=>{
    if(e.invincibleTimer>0)e.invincibleTimer-=dt;
    if(currentMode==='brawlball'){
      if(e.dead)return;
      if(e.hp<=0){
        e.dead=true;
        e.hasBall=false;
        if(ball && ball.owner===e){
          ball.owner=null;
          ball.vx+=randRange(-2,2);
          ball.vy+=randRange(-2,2);
        }
        e.respawnTimer=4;
        for(let i=0;i<20;i++)particles.push(new Particle(e.x,e.y,e.color,5,0.7));
      }else{
        aliveCount++;
      }
    }else{
      if(e.dead)return;
      if(e.hp<=0){
        e.dead=true;
        e.hasBall=false;
        if(ball && ball.owner===e){
          ball.owner=null;
          ball.vx+=randRange(-2,2);
          ball.vy+=randRange(-2,2);
        }
        for(let i=0;i<20;i++)particles.push(new Particle(e.x,e.y,e.color,5,0.7));
        powerCubes.push(new PowerCube(e.x,e.y));
      }else aliveCount++;
    }
  });
  if(currentMode==='showdown'){
    infoLabelEl.textContent='Alive: '+aliveCount;
    if(!player.dead && aliveCount===1)endMatchShowdown(true);
    else if(player.dead && !matchOver)endMatchShowdown(false);
  }
}
function updateRespawns(dt){
  if(currentMode!=='brawlball')return;
  entities.forEach(e=>{
    if(!e.dead)return;
    e.respawnTimer-=dt;
    if(e.respawnTimer<=0){
      e.dead=false;
      e.hp=e.maxHp;
      const sp=spawnPoints[e.team];
      let pos;
      for(let tries=0;tries<200;tries++){
        const x=sp.x+randRange(-40,40);
        const y=world.height*0.3+Math.random()*world.height*0.4;
        if(!collidesWithObstacles(x,y,e.radius,e.canWaterWalk)){pos={x,y};break;}
      }
      if(!pos)pos={x:sp.x,y:sp.y};
      e.x=pos.x;e.y=pos.y;
      e.vx=e.vy=0;
      e.invincibleTimer=2.5;
      for(let i=0;i<10;i++)particles.push(new Particle(e.x,e.y,'#4ad1ff',4,0.6));
      if(e.isPlayer)showCenterLabel('RESPAWN','#4ad1ff');
    }
  });
}

// End
function endMatchShowdown(victory){
  matchOver=true;gameState='result';
  resultTitle.textContent=victory?'Victory!':'Defeat';
  resultSub.textContent=victory?'You were the last brawler standing.':'You were eliminated. Better luck next time.';
  showPanel(resultPanel);setTopBarVisible(false);
}
function endMatchBrawlBall(victory){
  matchOver=true;gameState='result';
  resultTitle.textContent=victory?'Victory!':'Defeat';
  resultSub.textContent=victory?'Your team scored 2 goals first!':'The enemy team outscored you.';
  showPanel(resultPanel);setTopBarVisible(false);
}

// Main loop
let lastTime=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-lastTime)/1000);lastTime=now;
  if(gameState==='playing'){
    updateBushStatus();
    entities.forEach(e=>{if(!e.dead && !e.isPlayer){currentMode==='showdown'?aiShowdown(e,dt):aiBrawlBall(e,dt);}});
    updateMovement(dt);
    updateAmmo(dt);
    updateProjectiles(dt);
    updateBoxes(dt);
    updateGas(dt);
    if(currentMode==='brawlball')updateBall(dt);
    updateParticles(dt);
    updateHP(dt);
    updateRespawns(dt);
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Drawing
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  if(player){
    camera.x=clamp(player.x-canvas.width/2,0,Math.max(0,world.width-canvas.width));
    camera.y=clamp(player.y-canvas.height/2,0,Math.max(0,world.height-canvas.height));
  }else{camera.x=0;camera.y=0;}
  ctx.translate(-camera.x,-camera.y);
  drawBackground();
  drawWater();
  drawBushes(false);
  drawPowerBoxes();
  drawPowerCubes();
  drawWalls();
  if(gas)drawGas();
  if(goals.length)drawGoals();
  if(ball)drawBallShadow();
  drawEntities();
  if(ball)drawBall();
  drawBushes(true);
  drawProjectiles();
  drawParticles();
  drawDamageTexts();
  ctx.restore();
  drawPlayerHUD();
}

function drawBackground(){
  const grad=ctx.createLinearGradient(0,0,0,world.height);
  grad.addColorStop(0,'#18253a');
  grad.addColorStop(1,'#101522');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,world.width,world.height);
  const size=80;
  ctx.lineWidth=2;
  for(let x=0;x<world.width;x+=size){
    for(let y=0;y<world.height;y+=size){
      ctx.strokeStyle='rgba(0,0,0,0.18)';
      ctx.strokeRect(x+4,y+4,size-8,size-8);
    }
  }
}
function drawWalls(){
  ctx.lineWidth=4;
  walls.forEach(w=>{
    ctx.fillStyle='#39456b';
    ctx.strokeStyle='#0b0f1f';
    ctx.beginPath();
    ctx.roundRect(w.x,w.y,w.width,w.height,10);
    ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(w.x+6,w.y+6,w.width-12,10);
  });
}
function drawWater(){
  waterTiles.forEach(wt=>{
    ctx.save();
    ctx.fillStyle='#1b4f7a';
    ctx.strokeStyle='#0a2035';
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.roundRect(wt.x,wt.y,wt.width,wt.height,18);
    ctx.fill();ctx.stroke();
    ctx.globalAlpha=0.4;
    ctx.fillStyle='#4ad1ff';
    for(let i=0;i<6;i++){
      const rx=wt.x+randRange(10,wt.width-40);
      const ry=wt.y+randRange(10,wt.height-20);
      ctx.beginPath();
      ctx.ellipse(rx,ry,randRange(20,40),randRange(6,12),0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}
function drawBushes(){
  bushes.forEach(b=>{
    ctx.fillStyle='rgba(40,120,60,0.9)';
    ctx.strokeStyle='#0b2a14';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.roundRect(b.x,b.y,b.width,b.height,14);
    ctx.fill();ctx.stroke();
  });
}
function drawPowerBoxes(){
  powerBoxes.forEach(b=>{
    ctx.save();ctx.translate(b.x,b.y);
    ctx.lineWidth=4;
    ctx.fillStyle='#ffdf4a';
    ctx.strokeStyle='#3b2a08';
    ctx.beginPath();
    ctx.roundRect(-20,-20,40,40,8);
    ctx.fill();ctx.stroke();
    ctx.fillStyle='#3b2a08';
    ctx.fillRect(-6,-12,12,24);
    ctx.fillRect(-12,-6,24,12);
    ctx.restore();
  });
}
function drawPowerCubes(){
  powerCubes.forEach(c=>{
    ctx.save();ctx.translate(c.x,c.y);
    ctx.lineWidth=3;
    ctx.fillStyle='#ffdf4a';
    ctx.strokeStyle='#3b2a08';
    ctx.beginPath();
    ctx.roundRect(-10,-10,20,20,6);
    ctx.fill();ctx.stroke();
    ctx.restore();
  });
}
function drawGas(){
  ctx.save();
  ctx.globalAlpha=0.35;
  const grad=ctx.createRadialGradient(gas.cx,gas.cy,gas.radius*0.2,gas.cx,gas.cy,gas.radius);
  grad.addColorStop(0,'rgba(120,255,255,0.6)');
  grad.addColorStop(1,'rgba(40,80,120,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.arc(gas.cx,gas.cy,gas.radius,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function drawGoals(){
  goals.forEach(g=>{
    ctx.save();ctx.translate(g.x,g.y);
    ctx.lineWidth=4;
    ctx.fillStyle=g.team===0?'rgba(74,255,201,0.25)':'rgba(255,107,74,0.25)';
    ctx.strokeStyle=g.team===0?'#00c9a0':'#c93b1a';
    ctx.beginPath();
    ctx.roundRect(0,0,g.width,g.height,20);
    ctx.fill();ctx.stroke();
    ctx.restore();
  });
}
function drawBallShadow(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(ball.x,ball.y+6,ball.radius*0.9,ball.radius*0.5,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function drawBall(){
  ctx.save();ctx.translate(ball.x,ball.y);
  ctx.lineWidth=4;
  ctx.fillStyle='#f5f7ff';
  ctx.strokeStyle='#1b2038';
  ctx.beginPath();
  ctx.arc(0,0,ball.radius,0,Math.PI*2);
  ctx.fill();ctx.stroke();
  ctx.fillStyle='#ffdf4a';
  ctx.beginPath();
  ctx.arc(0,0,ball.radius*0.55,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function drawEntities(){
  entities.forEach(e=>{
    if(e.dead)return;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(e.x,e.y+8,e.radius*0.9,e.radius*0.5,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.save();ctx.translate(e.x,e.y);
    if(e.invincibleTimer>0){
      ctx.globalAlpha=0.7;
      ctx.strokeStyle='rgba(74,209,255,0.9)';
      ctx.lineWidth=4;
      ctx.beginPath();
      ctx.arc(0,0,e.radius+8,0,Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha=1;
    }
    ctx.lineWidth=5;
    ctx.fillStyle=e.color;
    ctx.strokeStyle=e.outline;
    ctx.beginPath();
    ctx.arc(0,0,e.radius,0,Math.PI*2);
    ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(0,-6,e.radius*0.55,Math.PI*0.1,Math.PI*0.9);
    ctx.fill();
    ctx.fillStyle='#1b2038';
    ctx.beginPath();
    ctx.arc(-6,-6,3,0,Math.PI*2);
    ctx.arc(6,-6,3,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,e.radius*0.7,Math.PI*0.2,Math.PI*0.8);
    ctx.stroke();
    if(e.power>0){
      ctx.fillStyle='#ffdf4a';
      ctx.beginPath();
      ctx.moveTo(-8,-e.radius-4);
      ctx.lineTo(0,-e.radius-10);
      ctx.lineTo(8,-e.radius-4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle='#3b2a08';
      ctx.lineWidth=2;
      ctx.stroke();
    }
    ctx.restore();
    const barW=60,barH=7;
    const hpRatio=clamp(e.hp/e.maxHp,0,1);
    ctx.save();
    ctx.translate(e.x,e.y-e.radius-18);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(-barW/2,-barH/2,barW,barH,4);
    ctx.fill();
    ctx.fillStyle=hpRatio<0.4?'#ff6b4a':'#3bff7a';
    ctx.beginPath();
    ctx.roundRect(-barW/2,-barH/2,barW*hpRatio,barH,4);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.font='12px system-ui';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillText(e.isPlayer?e.name+' (You)':e.name,e.x+1,e.y-e.radius-26+1);
    ctx.fillStyle='#f5f7ff';
    ctx.fillText(e.isPlayer?e.name+' (You)':e.name,e.x,e.y-e.radius-26);
    ctx.restore();
  });
}
function drawProjectiles(){
  projectiles.forEach(p=>{
    ctx.save();ctx.translate(p.x,p.y);
    ctx.fillStyle=p.color;
    ctx.strokeStyle='#1b2038';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,p.radius,0,Math.PI*2);
    ctx.fill();ctx.stroke();
    ctx.restore();
  });
}
function drawParticles(){
  particles.forEach(p=>{
    const t=p.life/p.maxLife;
    ctx.save();
    ctx.globalAlpha=clamp(t,0,1);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*t,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}
function drawDamageTexts(){
  damageTexts.forEach(d=>{
    const t=d.life/0.8;
    ctx.save();
    ctx.globalAlpha=clamp(t,0,1);
    ctx.font='14px system-ui';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillText(d.text,d.x+1,d.y+1);
    ctx.fillStyle=d.color;
    ctx.fillText(d.text,d.x,d.y);
    ctx.restore();
  });
}
function drawPlayerHUD(){
  if(!player)return;
  const ctx2=ctx;
  ctx2.save();
  ctx2.setTransform(1,0,0,1,0,0);
  const hpRatio=clamp(player.hp/player.maxHp,0,1);
  const barW=220,barH=18;
  const x=20,y=canvas.height-40;
  ctx2.fillStyle='rgba(0,0,0,0.7)';
  ctx2.beginPath();
  ctx2.roundRect(x,y,barW,barH,10);
  ctx2.fill();
  ctx2.fillStyle=hpRatio<0.4?'#ff6b4a':'#3bff7a';
  ctx2.beginPath();
  ctx2.roundRect(x,y,barW*hpRatio,barH,10);
  ctx2.fill();
  ctx2.font='13px system-ui';
  ctx2.fillStyle='#f5f7ff';
  ctx2.textAlign='center';
  ctx2.fillText('HP: '+Math.max(0,Math.round(player.hp))+'/'+Math.round(player.maxHp),x+barW/2,y+13);
  const ammoX=x,ammoY=y-30,slotW=20,slotH=14,gap=6;
  for(let i=0;i<player.ammoMax;i++){
    const sx=ammoX+i*(slotW+gap);
    ctx2.fillStyle='rgba(0,0,0,0.7)';
    ctx2.beginPath();
    ctx2.roundRect(sx,ammoY,slotW,slotH,6);
    ctx2.fill();
    if(i<player.ammo){
      ctx2.fillStyle='#ffdf4a';
      ctx2.beginPath();
      ctx2.roundRect(sx,ammoY,slotW,slotH,6);
      ctx2.fill();
    }else if(i===player.ammo){
      const ratio=1-clamp(player.ammoReloadTimer/(player.reloadTime*1.2),0,1);
      ctx2.fillStyle='#ffdf4a';
      ctx2.beginPath();
      ctx2.roundRect(sx,ammoY,slotW*ratio,slotH,6);
      ctx2.fill();
    }
  }
  ctx2.font='11px system-ui';
  ctx2.fillStyle='#f5f7ff';
  ctx2.textAlign='left';
  ctx2.fillText('Ammo',ammoX,ammoY-4);
  ctx2.restore();
}

// Initial
showPanel(mainMenu);
})();
</script>
